name: CI Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Use Node.js 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Backend Tests ────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (PHP / Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_mysql, pdo_sqlite, mbstring, zip, bcmath, gd, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run PHPUnit tests (SQLite in-memory)
        run: php artisan test --stop-on-failure
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array

  # ── Job 2: Frontend Lint + Build ────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (React / TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost/api

  # ── Job 3: Docker Build Validation ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t devops-practical-app:ci -f Dockerfile .

      - name: Build frontend Docker image
        run: docker build -t devops-practical-frontend:ci -f frontend/Dockerfile ./frontend

      - name: Verify images exist
        run: |
          docker images | grep devops-practical
          echo "✅ Docker images built successfully"
